name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Secret scanning ──────────────────────────────────────────────────────
      # Catches accidentally committed API keys, tokens, and secrets.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      # ── Dependency audit ─────────────────────────────────────────────────────
      # Fails on high/critical vulnerabilities in npm dependencies.
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Set to false once audit is clean

      # ── TypeScript type check ─────────────────────────────────────────────────
      # Ensures no type errors ship to production.
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── ESLint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint
        env:
          # Dummy env vars so Next.js doesn't crash during lint
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
